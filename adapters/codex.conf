# agent-resume adapter: codex (OpenAI Codex CLI)
# Codex has no launch-time session-id injection, so restore is best-effort:
# tmux-resurrect brings the pane back to the right directory, and you resume
# with `codex resume` (picker) or `codex resume --last`.
# When Codex adds a launch-time id flag, set AGENT_SUPPORTS_NEWID=1 and fill
# AGENT_NEWID_FLAG — the shim will then give it the same exact restore as claude.

AGENT_BIN="codex"

AGENT_SUPPORTS_NEWID=0
AGENT_NEWID_FLAG=""
AGENT_RESUME_FLAG="resume"

AGENT_CONTINUE_FLAGS="resume fork"
AGENT_PRINT_FLAGS="exec"

AGENT_SESSION_DIR="$HOME/.codex/sessions"
AGENT_SESSION_EXT="jsonl"

AGENT_ID_REGEX="[0-9a-f-]{36}"
