# agent-resume adapter: claude (Claude Code)
# Sourced by the shim and the CLI. POSIX sh key=value only.

AGENT_BIN="claude"

# Does the CLI let you choose the session id at launch time?
# 1 = inject a fresh --session-id on new runs (robust, race-free restore)
# 0 = best-effort only (no id injection; restore is approximate)
AGENT_SUPPORTS_NEWID=1
AGENT_NEWID_FLAG="--session-id"
AGENT_RESUME_FLAG="--resume"

# Flags/subcommands that already mean "resume/continue" -> shim passes through.
AGENT_CONTINUE_FLAGS="-c --continue -r --resume --from-pr"

# Non-interactive invocations -> shim never bakes an id.
AGENT_PRINT_FLAGS="-p --print"

# Where sessions are persisted, and the file extension, so the shim can tell
# whether a given id already exists (existing -> flip --session-id to --resume).
AGENT_SESSION_DIR="$HOME/.claude/projects"
AGENT_SESSION_EXT="jsonl"

# UUID shape used in saved commands (ERE, for grep -E).
AGENT_ID_REGEX="[0-9a-f-]{36}"
