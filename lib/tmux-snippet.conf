# Managed by agent-resume. Edit via `agent-resume install` / `uninstall`.
# Requires tpm (https://github.com/tmux-plugins/tpm). After install, press
# prefix + I inside tmux once to fetch the plugins.

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Restore pane contents and the programs that were running.
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"~claude" "~codex" "~node"'

# Rewrite baked --session-id back to --resume before panes relaunch.
set -g @resurrect-hook-pre-restore-all '$HOME/.config/agent-resume/pre-restore-hook.sh'

# Auto-save every 15 min and auto-restore when tmux starts.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
