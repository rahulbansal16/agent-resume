# Managed by agent-resume. Edit via `agent-resume install` / `uninstall`.
# Self-contained: agent-resume fetches tmux-resurrect and tmux-continuum into
# ~/.config/agent-resume/tmux-plugins and runs them directly, so tpm is NOT
# required. If you already use tpm, these run-shell lines coexist fine.

# Restore pane contents (visual). We do NOT list the agents in
# @resurrect-processes: Claude renames its process to its version number, so
# resurrect's name-based relaunch can't match it. Instead the post-restore hook
# below relaunches the agent with its exact session. resurrect still restores
# each pane's directory + shell, and always saves the full command (with the
# session id) regardless of this list.
set -g @resurrect-capture-pane-contents 'on'

# pre-restore: rewrite baked --session-id -> --resume in the saved state.
set -g @resurrect-hook-pre-restore-all '$HOME/.config/agent-resume/pre-restore-hook.sh'
# post-restore: type the resume command into each restored agent pane.
set -g @resurrect-hook-post-restore-all '$HOME/.config/agent-resume/post-restore-hook.sh'

# Auto-save every 15 min and auto-restore when tmux starts.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Load the plugins directly (resurrect first; continuum depends on it).
run-shell '$HOME/.config/agent-resume/tmux-plugins/tmux-resurrect/resurrect.tmux'
run-shell '$HOME/.config/agent-resume/tmux-plugins/tmux-continuum/continuum.tmux'
